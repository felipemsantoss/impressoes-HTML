<!--[main]-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ficha Técnica de Produção</title>
    <style>
        /* CONFIGURAÇÃO EXATA DA FONTE GLOBAL NO DOMPDF */
        * {
            font-family: Arial, Helvetica, sans-serif !important;
            box-sizing: border-box !important;
        }

        /* DIMENSÕES EXATAS DA PÁGINA (A4 PAISAGEM) E MARGENS DO LIBREOFFICE */
        @page {
            size: 29.70cm 21.00cm; /* Tamanho físico A4 deitado */
            margin: 1.00cm 0.50cm; /* Cima/Baixo: 1,00cm | Esquerda/Direita: 0,50cm */
        }

        body {
            font-size: 10px;
            color: #000000;
            margin: 0;
            padding: 0;
            line-height: 1.3;
            background-color: #ffffff;
        }

        /* Estrutura estável sem Flexbox para DOMPDF */
        table {
            width: 100%;
            border-collapse: collapse !important;
            table-layout: fixed;
        }

        /* Crachás de Cabeçalho (Materia Prima / Acabamento) */
        .badge-header {
            text-align: center;
            margin-bottom: 22px;
        }
        
        .badge-header span {
            border: 1.5px solid #000000;
            padding: 4px 22px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Linhas Dinâmicas de Preenchimento (Blank Lines) */
        .blank-line {
            display: inline-block;
            border-bottom: 1px solid #111111;
            height: 12px;
            vertical-align: bottom;
        }

        /* Linhas Estilo Caderno para Observações e Acabamento */
        .writing-line {
            border-bottom: 1px solid #333333;
            height: 19px;
            width: 100%;
        }

        /* Espaçamento vertical entre blocos de campos */
        .form-row {
            margin-bottom: 9px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <table style="width: 100%; border: none;">
        <colgroup>
            <col style="width: 50%;">
            <col style="width: 50%;">
        </colgroup>
        <tr>
            <!-- COLUNA ESQUERDA: MATÉRIA PRIMA -->
            <td style="border: none; padding: 0 15px; vertical-align: top; width: 50%;">
                
                <div class="badge-header">
                    <span>Matéria Prima</span>
                </div>

                <div class="form-row">ATADURA GESSADA:</div>
                
                <div class="form-row">
                    POLIO COR: <span class="blank-line" style="width: 160px;"></span> 
                    ESPESSURA: <span class="blank-line" style="width: 160px;"></span>
                </div>
                
                <div class="form-row">
                    TAMANHO: <span class="blank-line" style="width: 90px;"></span>
                </div>
                
                <div class="form-row">EVA TAMANHO:</div>
                
                <div class="form-row">
                    VELCRO COR: <span class="blank-line" style="width: 165px;"></span> 
                    MM: <span class="blank-line" style="width: 55px;"></span> 
                    MACHO: <span class="blank-line" style="width: 95px;"></span>
                </div>
                
                <div class="form-row">

                    MM: <span class="blank-line" style="width: 55px;"></span> 
                    FEMEA: <span class="blank-line" style="width: 95px;"></span>
                </div>
                
                <div class="form-row">
                    VELCRO COR: <span class="blank-line" style="width: 165px;"></span> 
                    MM: <span class="blank-line" style="width: 55px;"></span> 
                    MACHO: <span class="blank-line" style="width: 95px;"></span>
                </div>
                
                <div class="form-row">
                    VELCRO COR: <span class="blank-line" style="width: 165px;"></span> 
                    MM: <span class="blank-line" style="width: 55px;"></span> 
                    FEMEA: <span class="blank-line" style="width: 95px;"></span>
                </div>
                
                <div class="form-row">
                    ANTIDERRAPANTE COR: <span class="blank-line" style="width: 180px;"></span> 
                    TAMANHO: <span class="blank-line" style="width: 100px;"></span>
                </div>
                
                <div class="form-row">
                    PEÇA EXTRA PARA PRÓTESE: <span class="blank-line" style="width: 330px;"></span>
                </div>
                
                <div class="form-row">

                </div>
                
                <div class="form-row">

                <!-- Campo de Observações com Linhas Estilo Caderno -->

            </td>
        </tr>
    </table>

</body>
</html>
<!--[/main]-->
